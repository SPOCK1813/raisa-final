<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAiSA Final Stage</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: "Helvetica Neue", Arial, sans-serif;
      color: #e7c66a;
    }

    body {
      position: relative;
    }

    .screen {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* 最初の扉画面 */
    #intro {
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at center, rgba(120, 90, 20, 0.22) 0%, rgba(0,0,0,0) 40%),
        #000;
      overflow: hidden;
    }

    .sparkles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.35;
      background:
        radial-gradient(circle at 15% 30%, rgba(231,198,106,0.18) 0 1px, transparent 2px),
        radial-gradient(circle at 80% 20%, rgba(231,198,106,0.18) 0 1px, transparent 2px),
        radial-gradient(circle at 30% 80%, rgba(231,198,106,0.14) 0 1px, transparent 2px),
        radial-gradient(circle at 70% 75%, rgba(231,198,106,0.14) 0 1px, transparent 2px);
      background-size: 180px 180px, 220px 220px, 200px 200px, 260px 260px;
      animation: twinkle 4s ease-in-out infinite alternate;
    }

    @keyframes twinkle {
      from { opacity: 0.2; }
      to   { opacity: 0.45; }
    }

    .intro-wrap {
      position: relative;
      width: min(92vw, 460px);
      aspect-ratio: 9 / 16;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .light {
      position: absolute;
      inset: 0;
      margin: auto;
      width: 30%;
      height: 70%;
      background: radial-gradient(
        ellipse at center,
        rgba(255, 235, 180, 0.85) 0%,
        rgba(231, 198, 106, 0.45) 28%,
        rgba(231, 198, 106, 0.10) 55%,
        rgba(0, 0, 0, 0) 75%
      );
      filter: blur(14px);
      opacity: 0.25;
      transition: opacity 1s ease;
      z-index: 1;
    }

    .door-frame {
      position: relative;
      width: 78%;
      height: 78%;
      border: 1.5px solid rgba(231, 198, 106, 0.45);
      box-shadow:
        0 0 0 1px rgba(231,198,106,0.14) inset,
        0 0 24px rgba(231,198,106,0.08);
      z-index: 3;
      overflow: hidden;
      border-radius: 2px;
    }

    .door {
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      background:
        linear-gradient(to bottom, rgba(50,40,15,0.65), rgba(20,15,8,0.88)),
        #15120d;
      border: 1px solid rgba(231,198,106,0.22);
      transition: transform 1.6s cubic-bezier(.77,0,.18,1), opacity 1.1s ease;
      box-shadow: inset 0 0 30px rgba(231,198,106,0.06);
    }

    .door.left {
      left: 0;
      border-right: 0.5px solid rgba(231,198,106,0.25);
      transform-origin: left center;
    }

    .door.right {
      right: 0;
      border-left: 0.5px solid rgba(231,198,106,0.25);
      transform-origin: right center;
    }

    .door::before {
      content: "";
      position: absolute;
      inset: 10% 12%;
      border: 1px solid rgba(231,198,106,0.16);
    }

    .knob {
      position: absolute;
      top: 50%;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #d7b65b;
      box-shadow: 0 0 12px rgba(231,198,106,0.45);
      transform: translateY(-50%);
    }

    .door.left .knob { right: 10px; }
    .door.right .knob { left: 10px; }

    .intro-text {
      position: absolute;
      left: 50%;
      top: 12%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 5;
      width: 90%;
      pointer-events: none;
    }

    .intro-title {
      font-size: clamp(28px, 7vw, 42px);
      letter-spacing: 1px;
      margin: 0;
      color: #e7c66a;
      text-shadow: 0 0 18px rgba(231,198,106,0.14);
    }

    .intro-sub {
      margin-top: 10px;
      font-size: clamp(13px, 3.4vw, 16px);
      letter-spacing: 3px;
      color: #c8aa59;
    }

    .intro-date {
      margin-top: 8px;
      font-size: clamp(12px, 3vw, 14px);
      letter-spacing: 3px;
      color: #b89748;
    }

    .tap {
      position: absolute;
      left: 50%;
      bottom: 8%;
      transform: translateX(-50%);
      z-index: 5;
      font-size: 13px;
      letter-spacing: 2px;
      color: #e7c66a;
      opacity: 0.88;
      text-align: center;
      line-height: 1.8;
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.45; }
      50% { opacity: 1; }
    }

    #intro.open .door.left {
      transform: translateX(-105%);
      opacity: 0;
    }

    #intro.open .door.right {
      transform: translateX(105%);
      opacity: 0;
    }

    #intro.open .light {
      opacity: 0.95;
    }

    /* 動画画面 */
    #playerScreen {
      display: none;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    #playerWrap {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      position: relative;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }

    /* 動画後のラスト */
    #ending {
      display: none;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at center, rgba(120, 90, 20, 0.15) 0%, rgba(0,0,0,0) 38%),
        #000;
      text-align: center;
      padding: 24px;
    }

    .ending-inner {
      animation: fadeIn 1.2s ease forwards;
      opacity: 0;
    }

    .ending-main {
      font-size: clamp(28px, 8vw, 42px);
      color: #e7c66a;
      margin: 0 0 14px;
      letter-spacing: 1px;
    }

    .ending-sub {
      font-size: clamp(13px, 4vw, 18px);
      color: #d5b86d;
      margin: 0 0 24px;
      letter-spacing: 2px;
      line-height: 1.9;
    }

    .ending-logo {
      font-size: clamp(18px, 5vw, 28px);
      color: #e7c66a;
      letter-spacing: 2px;
      margin-top: 8px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- 扉画面 -->
  <section id="intro" class="screen">
    <div class="sparkles"></div>

    <div class="intro-wrap">
      <div class="light"></div>

      <div class="intro-text">
        <h1 class="intro-title">RAiSA</h1>
        <div class="intro-sub">FINAL STAGE</div>
        <div class="intro-date">2026.04.21</div>
      </div>

      <div class="door-frame" id="doorFrame">
        <div class="door left">
          <div class="knob"></div>
        </div>
        <div class="door right">
          <div class="knob"></div>
        </div>
      </div>

      <div class="tap">
        卒業の扉をひらく<br>
        Tap to open
      </div>
    </div>
  </section>

  <!-- 動画 -->
  <section id="playerScreen" class="screen">
    <div id="playerWrap">
      <video id="movie" controls playsinline preload="metadata">
        <source src="raisa-movie.mp4" type="video/mp4">
      </video>
    </div>
  </section>

  <!-- 動画後 -->
  <section id="ending" class="screen">
    <div class="ending-inner">
      <div class="ending-main">また会おうな</div>
      <div class="ending-sub">Keep shining in our hearts</div>
      <div class="ending-logo">O-VER-KiLL</div>
    </div>
  </section>

  <script>
    const intro = document.getElementById("intro");
    const playerScreen = document.getElementById("playerScreen");
    const ending = document.getElementById("ending");
    const movie = document.getElementById("movie");

    let started = false;

    function openDoorAndPlay() {
      if (started) return;
      started = true;

      intro.classList.add("open");

      setTimeout(() => {
        intro.style.display = "none";
        playerScreen.style.display = "flex";

        const playPromise = movie.play();
        if (playPromise !== undefined) {
          playPromise.catch(() => {
            // 自動再生できない時は controls で手動再生
          });
        }
      }, 1500);
    }

    intro.addEventListener("click", openDoorAndPlay);
    intro.addEventListener("touchstart", openDoorAndPlay, { passive: true });

    movie.addEventListener("ended", () => {
      playerScreen.style.display = "none";
      ending.style.display = "flex";
    });
  </script>
</body>
</html>
