<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAiSA Final Stage</title>
  <style>
  <style>
  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    font-family: "Helvetica Neue", Arial, sans-serif;
    color: #e7c66a;
  }

  body {
    position: relative;
  }

  .screen {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  #intro {
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(circle at center, rgba(180,130,30,0.14) 0%, rgba(0,0,0,0) 38%),
      #000;
    overflow: hidden;
  }

  .sparkles {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.32;
    background:
      radial-gradient(circle at 12% 20%, rgba(231,198,106,0.18) 0 1px, transparent 2px),
      radial-gradient(circle at 78% 14%, rgba(231,198,106,0.16) 0 1px, transparent 2px),
      radial-gradient(circle at 25% 85%, rgba(231,198,106,0.14) 0 1px, transparent 2px),
      radial-gradient(circle at 86% 78%, rgba(231,198,106,0.14) 0 1px, transparent 2px);
    background-size: 180px 180px, 220px 220px, 200px 200px, 250px 250px;
    animation: twinkle 4s ease-in-out infinite alternate;
  }

  @keyframes twinkle {
    from { opacity: 0.18; }
    to   { opacity: 0.4; }
  }

  .intro-wrap {
    position: relative;
    width: min(96vw, 520px);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .light {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 28%;
    height: 82%;
    background: radial-gradient(
      ellipse at center,
      rgba(255, 245, 210, 0.98) 0%,
      rgba(245, 215, 120, 0.72) 18%,
      rgba(231, 198, 106, 0.36) 35%,
      rgba(231, 198, 106, 0.12) 55%,
      rgba(0,0,0,0) 75%
    );
    filter: blur(26px);
    opacity: 0.22;
    transition: opacity 2.2s ease, transform 2.2s ease, width 2.2s ease;
    z-index: 1;
  }

  .door-frame {
    position: relative;
    width: 92%;
    height: 78%;
    border: 1.5px solid rgba(231,198,106,0.42);
    box-shadow:
      0 0 0 1px rgba(231,198,106,0.12) inset,
      0 0 30px rgba(231,198,106,0.09);
    border-radius: 2px;
    overflow: hidden;
    z-index: 3;
    background: rgba(20, 14, 7, 0.18);
  }

  .door {
    position: absolute;
    top: 0;
    width: 50%;
    height: 100%;
    background:
      linear-gradient(to bottom, rgba(60,45,18,0.62), rgba(18,12,6,0.96)),
      #120f0b;
    border: 1px solid rgba(231,198,106,0.18);
    transition:
      transform 2.8s cubic-bezier(.77,0,.18,1),
      opacity 1.8s ease;
    box-shadow:
      inset 0 0 40px rgba(231,198,106,0.05),
      inset 0 0 90px rgba(0,0,0,0.28);
  }

  .door.left {
    left: 0;
    border-right: 0.5px solid rgba(231,198,106,0.22);
  }

  .door.right {
    right: 0;
    border-left: 0.5px solid rgba(231,198,106,0.22);
  }

  .door::before {
    content: "";
    position: absolute;
    inset: 9% 10%;
    border: 1px solid rgba(231,198,106,0.13);
  }

  .door::after {
    content: "";
    position: absolute;
    top: 0;
    bottom: 0;
    width: 16px;
    background: linear-gradient(
      to right,
      rgba(255,235,170,0.00),
      rgba(255,235,170,0.10),
      rgba(255,235,170,0.00)
    );
    filter: blur(5px);
  }

  .door.left::after { right: 2px; }
  .door.right::after { left: 2px; }

  .knob {
    position: absolute;
    top: 50%;
    width: 13px;
    height: 13px;
    border-radius: 50%;
    background: #e7c66a;
    box-shadow: 0 0 14px rgba(231,198,106,0.6);
    transform: translateY(-50%);
  }

  .door.left .knob { right: 12px; }
  .door.right .knob { left: 12px; }

  .intro-text {
    position: absolute;
    left: 50%;
    top: 10%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 5;
    width: 90%;
    pointer-events: none;
  }

  .intro-title {
    font-size: clamp(34px, 8vw, 54px);
    letter-spacing: 1px;
    margin: 0;
    color: #e7c66a;
    text-shadow: 0 0 22px rgba(231,198,106,0.16);
  }

  .intro-sub {
    margin-top: 10px;
    font-size: clamp(15px, 3.7vw, 18px);
    letter-spacing: 4px;
    color: #d4b15b;
  }

  .intro-date {
    margin-top: 10px;
    font-size: clamp(13px, 3.1vw, 15px);
    letter-spacing: 4px;
    color: #c19b47;
  }

  .tap {
    position: absolute;
    left: 50%;
    bottom: 8%;
    transform: translateX(-50%);
    z-index: 5;
    font-size: 14px;
    letter-spacing: 2px;
    color: #e7c66a;
    opacity: 0.9;
    text-align: center;
    line-height: 1.9;
    animation: pulse 1.8s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.42; }
    50% { opacity: 1; }
  }

  #intro.open .door.left {
    transform: translateX(-112%);
    opacity: 0.15;
  }

  #intro.open .door.right {
    transform: translateX(112%);
    opacity: 0.15;
  }

  #intro.open .light {
    opacity: 1;
    width: 58%;
    transform: translate(-50%, -50%) scale(1.12);
  }

  #playerScreen {
    display: none;
    align-items: center;
    justify-content: center;
    background: #000;
  }

  #playerWrap {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    position: relative;
  }

  video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #000;
  }

  #ending {
    display: none;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(circle at center, rgba(120, 90, 20, 0.15) 0%, rgba(0,0,0,0) 38%),
      #000;
    text-align: center;
    padding: 24px;
  }

  .ending-inner {
    animation: fadeIn 1.2s ease forwards;
    opacity: 0;
    width: 100%;
    text-align: center;
  }

  .ending-main {
    font-size: clamp(28px, 8vw, 42px);
    color: #e7c66a;
    margin: 0 0 14px;
    letter-spacing: 1px;
    text-align: center;
    width: 100%;
  }

  .ending-sub {
    font-size: clamp(13px, 4vw, 18px);
    color: #d5b86d;
    margin: 0 0 24px;
    letter-spacing: 1px;
    line-height: 1.9;
  }

  .ending-logo {
    font-size: clamp(18px, 5vw, 28px);
    color: #e7c66a;
    letter-spacing: 2px;
    margin-top: 8px;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
    
  </style>
</head>
<body>

  <!-- 扉画面 -->
  <section id="intro" class="screen">
    <div class="sparkles"></div>

    <div class="intro-wrap">
      <div class="light"></div>

      <div class="intro-text">
        <h1 class="intro-title">RAiSA</h1>
        <div class="intro-sub">FINAL STAGE</div>
        <div class="intro-date">2026.04.21</div>
      </div>

      <div class="door-frame" id="doorFrame">
        <div class="door left">
          <div class="knob"></div>
        </div>
        <div class="door right">
          <div class="knob"></div>
        </div>
      </div>

      <div class="tap">
        卒業の扉をひらく<br>
        Tap to open
      </div>
    </div>
  </section>

  <!-- 動画 -->
  <section id="playerScreen" class="screen">
    <div id="playerWrap">
      <video id="movie" controls playsinline preload="metadata">
        <source src="raisa-movie.mp4" type="video/mp4">
      </video>
    </div>
  </section>

  <!-- 動画後 -->
  <section id="ending" class="screen">
    <div class="ending-inner">
      <div class="ending-main">また会おうな</div>
      <div class="ending-sub">Keep shining in our hearts</div>
      <div class="ending-logo">O-VER-KiLL</div>
    </div>
  </section>

 <script>
  const intro = document.getElementById("intro");
  const playerScreen = document.getElementById("playerScreen");
  const ending = document.getElementById("ending");
  const movie = document.getElementById("movie");

  let started = false;

  function openDoorAndPlay() {
    if (started) return;
    started = true;

    intro.classList.add("open");

    setTimeout(() => {
      intro.style.display = "none";
      playerScreen.style.display = "flex";

      const playPromise = movie.play();
      if (playPromise !== undefined) {
        playPromise.catch(() => {
          // 自動再生できない時は手動再生
        });
      }
    }, 2800);
  }
  
    intro.addEventListener("click", openDoorAndPlay);
    intro.addEventListener("touchstart", openDoorAndPlay, { passive: true });

    movie.addEventListener("ended", () => {
      playerScreen.style.display = "none";
      ending.style.display = "flex";
    });
  </script>
</body>
</html>
